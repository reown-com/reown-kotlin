appId: com.reown.sample.dapp.internal
name: Kotlin Dapp to Kotlin Wallet personal_sign Rejected
---
- launchApp:
    permissions:
      all: allow
- startRecording: "Native personal_sign Rejected"
- extendedWaitUntil:
    visible:
      text: "Ethereum_Main"
    timeout: 15000
- tapOn: "Ethereum_Main"
- tapOn: "personal_sign"
- extendedWaitUntil:
    visible:
      text: "Cancel"
    timeout: 30000
- tapOn: "Cancel"
- extendedWaitUntil:
    visible:
      text: "result_error"
    timeout: 15000
- assertVisible: result_error
- stopRecording
