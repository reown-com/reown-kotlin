appId: com.reown.sample.dapp.internal
name: Kotlin Dapp to Kotlin Wallet Connection Confirmed
---
- clearState
- launchApp:
    permissions:
      all: allow
- startRecording: "Native Connection Confirmed"
- extendedWaitUntil:
    visible:
      text: "Chain selection"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "Ethereum"
    timeout: 15000
- tapOn: "Ethereum"
- tapOn: "Connect via AppKit"
- extendedWaitUntil:
    visible:
      text: "All wallets"
    timeout: 15000
- tapOn: "All wallets"
- extendedWaitUntil:
    visible:
      text: "Android Sample Internal"
    timeout: 30000
- tapOn: "Android Sample Internal"
- extendedWaitUntil:
    visible:
      text: "Connect"
    timeout: 30000
- tapOn: "Connect"
- extendedWaitUntil:
    visible:
      text: "Ethereum_main"
    timeout: 15000
- assertVisible: "Ethereum_main"
- stopRecording
