appId: com.reown.sample.dapp.internal
name: Kotlin Dapp to Kotlin Wallet Connection Confirmed
---
- clearState
- launchApp:
    permissions:
      all: allow
- startRecording: "Native Connection Confirmed"
- tapOn: "NOT NOW"
- tapOn: "Ethereum"
- tapOn: "Connect via AppKit"
- tapOn: "All wallets"
- tapOn: "Android Sample Internal"
- extendedWaitUntil:
    visible:
      text: "Connect"
    timeout: 30000
- tapOn: "Connect"
- extendedWaitUntil:
    visible:
      text: "Ethereum_main"
    timeout: 15000
- assertVisible: "Ethereum_main"
- stopRecording