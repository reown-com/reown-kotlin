appId: com.reown.sample.dapp.internal
name: Kotlin Dapp to Kotlin Wallet Connection Rejected
---
- clearState
- launchApp:
    appId: "com.reown.sample.wallet.internal"
- startRecording: "Native Connection Rejected"
- launchApp:
    appId: "com.reown.sample.dapp.internal"
    permissions:
      all: allow
- extendedWaitUntil:
    visible:
      text: "Ethereum"
    timeout: 15000
- tapOn: "Ethereum"
- tapOn: "Connect via AppKit"
- extendedWaitUntil:
    visible:
      text: "All wallets"
    timeout: 15000
- tapOn: "All wallets"
- extendedWaitUntil:
    visible:
      text: "Android Sample Internal"
    timeout: 15000
- tapOn: "Android Sample Internal"
- extendedWaitUntil:
    visible:
      text: "Cancel"
    timeout: 30000
- tapOn: "Cancel"
- extendedWaitUntil:
    visible:
      text: "Connection declined"
    timeout: 15000
- assertVisible: "Connection declined"
- stopRecording
