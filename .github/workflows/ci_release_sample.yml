name: Release Samples

permissions:
  contents: read

on:
  push:
    branches:
      - develop
    paths:
      - 'foundation/**'
      - 'core/**'
      - 'protocol/**'
      - 'product/**'
      - 'sample/**'
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options:
          - Internal
          - Debug
          - Release
        default: Internal
      wallet:
        description: 'Wallet'
        type: boolean
        default: true
      dapp:
        description: 'dApp'
        type: boolean
        default: true
      modal:
        description: 'Modal'
        type: boolean
        default: true
      pos:
        description: 'POS'
        type: boolean
        default: true

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || (github.event_name == 'release' && 'Release') || 'Internal' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo 'matrix={"app":["wallet","dapp","modal","pos"]}' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo 'matrix={"app":["wallet","dapp","modal"]}' >> $GITHUB_OUTPUT
          else
            APPS=()
            [[ "${{ github.event.inputs.wallet }}" == "true" ]] && APPS+=("\"wallet\"")
            [[ "${{ github.event.inputs.dapp }}" == "true" ]] && APPS+=("\"dapp\"")
            [[ "${{ github.event.inputs.modal }}" == "true" ]] && APPS+=("\"modal\"")
            [[ "${{ github.event.inputs.pos }}" == "true" ]] && APPS+=("\"pos\"")
            JOINED=$(IFS=,; echo "${APPS[*]}")
            echo "matrix={\"app\":[${JOINED}]}" >> $GITHUB_OUTPUT
          fi

  release_sample:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          architecture: x86_64
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Required files to build samples
        with:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_SERVICE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
          SECRETS_PROPERTIES: ${{ secrets.SECRETS_PROPERTIES }}
          ENCODED_STRING_DEBUG: ${{ secrets.WC_KOTLIN_DEBUG_KEYSTORE }}
          SIGNING_KEY_STORE_PATH_DEBUG: ${{ secrets.WC_KOTLIN_DEBUG_KEYSTORE_PATH }}
          ENCODED_STRING_INTERNAL: ${{ secrets.WC_KOTLIN_INTERNAL_KEYSTORE }}
          SIGNING_KEY_STORE_PATH_INTERNAL: ${{ secrets.WC_KOTLIN_INTERNAL_KEYSTORE_PATH }}
          ENCODED_STRING_UPLOAD: ${{ secrets.WC_KOTLIN_UPLOAD_KEYSTORE }}
          SIGNING_KEY_STORE_PATH_UPLOAD: ${{ secrets.WC_KOTLIN_UPLOAD_KEYSTORE_PATH }}
        uses: ./.github/actions/ci_setup

      - name: Release sample
        env:
          WC_CLOUD_PROJECT_ID: ${{ secrets.WC_CLOUD_PROJECT_ID }}
          POS_PROJECT_ID: ${{ secrets.POS_PROJECT_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          NOTIFY_INTEGRATION_TESTS_PROJECT_ID: ${{ secrets.NOTIFY_INTEGRATION_TESTS_PROJECT_ID }}
          NOTIFY_INTEGRATION_TESTS_SECRET: ${{ secrets.NOTIFY_INTEGRATION_TESTS_SECRET }}
          MIX_PANEL: ${{ secrets.MIX_PANEL }}
        run: |
          CMD=":sample:${{ matrix.app }}:assemble${{ env.BUILD_TYPE }}"
          if [[ "${{ matrix.app }}" != "pos" ]]; then
            CMD="$CMD :sample:${{ matrix.app }}:appDistributionUpload${{ env.BUILD_TYPE }}"
          fi
          ./gradlew $CMD

      - name: Stop Gradle
        run: ./gradlew --stop

      - name: Resolve Firebase URL
        id: firebase
        if: always() && matrix.app != 'pos'
        run: |
          case "${{ matrix.app }}-${{ env.BUILD_TYPE }}" in
            wallet-Release) echo "url=${{ secrets.FIREBASE_WALLET_RELEASE_URL }}" >> $GITHUB_OUTPUT ;;
            wallet-Internal) echo "url=${{ secrets.FIREBASE_WALLET_INTERNAL_URL }}" >> $GITHUB_OUTPUT ;;
            wallet-Debug) echo "url=${{ secrets.FIREBASE_WALLET_DEBUG_URL }}" >> $GITHUB_OUTPUT ;;
            dapp-Release) echo "url=${{ secrets.FIREBASE_DAPP_RELEASE_URL }}" >> $GITHUB_OUTPUT ;;
            dapp-Internal) echo "url=${{ secrets.FIREBASE_DAPP_INTERNAL_URL }}" >> $GITHUB_OUTPUT ;;
            dapp-Debug) echo "url=${{ secrets.FIREBASE_DAPP_DEBUG_URL }}" >> $GITHUB_OUTPUT ;;
            modal-Release) echo "url=${{ secrets.FIREBASE_MODAL_RELEASE_URL }}" >> $GITHUB_OUTPUT ;;
            modal-Internal) echo "url=${{ secrets.FIREBASE_MODAL_INTERNAL_URL }}" >> $GITHUB_OUTPUT ;;
            modal-Debug) echo "url=${{ secrets.FIREBASE_MODAL_DEBUG_URL }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send Slack notification
        if: always() && !cancelled()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Android Sample Build - ${{ matrix.app }} (${{ env.BUILD_TYPE }})",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Android Sample Build Report" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*App:*\n`${{ matrix.app }}`" },
                    { "type": "mrkdwn", "text": "*Build Type:*\n`${{ env.BUILD_TYPE }}`" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Status:*\n`${{ job.status == 'success' && 'Success' || 'Failed' }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }${{ steps.firebase.outputs.url && format(',{{"type":"button","text":{{"type":"plain_text","text":"Download on Firebase"}},"url":{0}}}', toJSON(steps.firebase.outputs.url)) || '' }}
                  ]
                }
              ]
            }
